name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package dist
        run: |
          cd dist
          tar -czf ../dist.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.tar.gz
          generate_release_notes: true
